<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <rect width="480" height="200" fill="#0d1117" rx="10"/>
  <text x="20" y="24" fill="#6e7681" font-size="11" font-family="ui-sans-serif,sans-serif" letter-spacing="1">ONE-TO-MANY (ForeignKey)</text>

  <!-- Department card -->
  <rect x="20" y="45" width="150" height="120" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="95" y="68" fill="#388bfd" font-size="11" font-family="ui-sans-serif,sans-serif" text-anchor="middle" font-weight="600">Department</text>
  <line x1="20" y1="75" x2="170" y2="75" stroke="#21262d" stroke-width="1"/>
  <text x="35" y="96" fill="#58a6ff" font-size="11" font-family="Courier New,monospace">id</text>
  <text x="90" y="96" fill="#8b949e" font-size="11" font-family="Courier New,monospace">1</text>
  <text x="35" y="116" fill="#58a6ff" font-size="11" font-family="Courier New,monospace">name</text>
  <text x="90" y="116" fill="#8b949e" font-size="11" font-family="Courier New,monospace">"CS"</text>
  <text x="35" y="155" fill="#388bfd" font-size="10" font-family="ui-sans-serif,sans-serif" opacity="0.7">one department</text>

  <!-- Cardinality labels -->
  <text x="182" y="109" fill="#58a6ff" font-size="15" font-family="ui-sans-serif,sans-serif" font-weight="700">1</text>
  <text x="270" y="109" fill="#e3b341" font-size="15" font-family="ui-sans-serif,sans-serif" font-weight="700" text-anchor="end">N</text>

  <!-- Connection lines (tree fork) -->
  <line x1="170" y1="105" x2="230" y2="105" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="41" x2="230" y2="163" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="41" x2="290" y2="41" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="102" x2="290" y2="102" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="163" x2="290" y2="163" stroke="#484f58" stroke-width="1.5"/>

  <!-- Student card: Ali -->
  <rect x="290" y="20" width="170" height="42" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="305" y="37" fill="#e6edf3" font-size="11" font-family="Courier New,monospace">Ali</text>
  <text x="305" y="53" fill="#6e7681" font-size="10" font-family="Courier New,monospace">dept_id: 1</text>

  <!-- Student card: Sara -->
  <rect x="290" y="81" width="170" height="42" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="305" y="98" fill="#e6edf3" font-size="11" font-family="Courier New,monospace">Sara</text>
  <text x="305" y="114" fill="#6e7681" font-size="10" font-family="Courier New,monospace">dept_id: 1</text>

  <!-- Student card: John -->
  <rect x="290" y="142" width="170" height="42" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="305" y="159" fill="#e6edf3" font-size="11" font-family="Courier New,monospace">John</text>
  <text x="305" y="175" fill="#6e7681" font-size="10" font-family="Courier New,monospace">dept_id: 1</text>

  <!-- Label -->
  <text x="375" y="195" fill="#e3b341" font-size="10" font-family="ui-sans-serif,sans-serif" text-anchor="middle" opacity="0.7">many students</text>
</svg>
