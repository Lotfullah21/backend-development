<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160">
  <rect width="480" height="160" fill="#0d1117" rx="10"/>
  <text x="20" y="24" fill="#6e7681" font-size="11" font-family="ui-sans-serif,sans-serif" letter-spacing="1">ONE-TO-ONE (OneToOneField)</text>

  <!-- User card -->
  <rect x="20" y="40" width="150" height="100" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="95" y="62" fill="#388bfd" font-size="11" font-family="ui-sans-serif,sans-serif" text-anchor="middle" font-weight="600">User</text>
  <line x1="20" y1="68" x2="170" y2="68" stroke="#21262d" stroke-width="1"/>
  <text x="35" y="88" fill="#58a6ff" font-size="11" font-family="Courier New,monospace">id</text>
  <text x="90" y="88" fill="#8b949e" font-size="11" font-family="Courier New,monospace">1</text>
  <text x="35" y="108" fill="#58a6ff" font-size="11" font-family="Courier New,monospace">name</text>
  <text x="90" y="108" fill="#8b949e" font-size="11" font-family="Courier New,monospace">"alice"</text>

  <!-- Connection line -->
  <line x1="170" y1="90" x2="310" y2="90" stroke="#484f58" stroke-width="1.5"/>

  <!-- Cardinality labels -->
  <text x="182" y="85" fill="#58a6ff" font-size="15" font-family="ui-sans-serif,sans-serif" font-weight="700">1</text>
  <text x="298" y="85" fill="#3fb950" font-size="15" font-family="ui-sans-serif,sans-serif" font-weight="700" text-anchor="end">1</text>

  <!-- Profile card -->
  <rect x="310" y="40" width="150" height="100" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="385" y="62" fill="#3fb950" font-size="11" font-family="ui-sans-serif,sans-serif" text-anchor="middle" font-weight="600">Profile</text>
  <line x1="310" y1="68" x2="460" y2="68" stroke="#21262d" stroke-width="1"/>
  <text x="325" y="88" fill="#3fb950" font-size="11" font-family="Courier New,monospace">user_id</text>
  <text x="395" y="88" fill="#8b949e" font-size="11" font-family="Courier New,monospace">1</text>
  <text x="325" y="108" fill="#3fb950" font-size="11" font-family="Courier New,monospace">bio</text>
  <text x="395" y="108" fill="#8b949e" font-size="11" font-family="Courier New,monospace">"Dev..."</text>
</svg>
