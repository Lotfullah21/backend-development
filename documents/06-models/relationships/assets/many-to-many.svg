<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210">
  <rect width="480" height="210" fill="#0d1117" rx="10"/>
  <text x="20" y="24" fill="#6e7681" font-size="11" font-family="ui-sans-serif,sans-serif" letter-spacing="1">MANY-TO-MANY (ManyToManyField)</text>

  <!-- Student cards (left) -->
  <text x="95" y="50" fill="#e3b341" font-size="11" font-family="ui-sans-serif,sans-serif" text-anchor="middle" font-weight="600">Students</text>

  <rect x="30" y="58" width="130" height="34" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="95" y="80" fill="#e6edf3" font-size="12" font-family="Courier New,monospace" text-anchor="middle">Ali</text>

  <rect x="30" y="102" width="130" height="34" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="95" y="124" fill="#e6edf3" font-size="12" font-family="Courier New,monospace" text-anchor="middle">Sara</text>

  <rect x="30" y="146" width="130" height="34" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="95" y="168" fill="#e6edf3" font-size="12" font-family="Courier New,monospace" text-anchor="middle">John</text>

  <!-- Course cards (right) -->
  <text x="385" y="50" fill="#bc8cff" font-size="11" font-family="ui-sans-serif,sans-serif" text-anchor="middle" font-weight="600">Courses</text>

  <rect x="320" y="58" width="130" height="34" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="385" y="80" fill="#e6edf3" font-size="12" font-family="Courier New,monospace" text-anchor="middle">Python</text>

  <rect x="320" y="102" width="130" height="34" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="385" y="124" fill="#e6edf3" font-size="12" font-family="Courier New,monospace" text-anchor="middle">Django</text>

  <rect x="320" y="146" width="130" height="34" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="385" y="168" fill="#e6edf3" font-size="12" font-family="Courier New,monospace" text-anchor="middle">REST</text>

  <!-- Relationship lines -->
  <!-- Ali → Python, Django -->
  <line x1="160" y1="75" x2="320" y2="75" stroke="#484f58" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="75" x2="320" y2="119" stroke="#484f58" stroke-width="1" opacity="0.6"/>

  <!-- Sara → Python -->
  <line x1="160" y1="119" x2="320" y2="75" stroke="#484f58" stroke-width="1" opacity="0.6"/>

  <!-- John → Django, REST -->
  <line x1="160" y1="163" x2="320" y2="119" stroke="#484f58" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="163" x2="320" y2="163" stroke="#484f58" stroke-width="1" opacity="0.6"/>

  <!-- N ── N label -->
  <text x="240" y="200" fill="#6e7681" font-size="11" font-family="ui-sans-serif,sans-serif" text-anchor="middle">each student → many courses | each course → many students</text>
</svg>
