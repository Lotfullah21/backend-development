<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Django request and response flow</title>
  <desc id="desc">A clean animated diagram showing Browser to urls.py to View for the request, and View back to Browser for the response.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>

    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#2563eb" />
    </marker>

    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#059669" />
    </marker>

    <style>
      .bg {
        fill: url(#bg);
      }

      .title {
        fill: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 34px;
        font-weight: 700;
      }

      .subtitle {
        fill: #475569;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
      }

      .lane-pill-request {
        fill: #dbeafe;
        stroke: #93c5fd;
        stroke-width: 1.5;
      }

      .lane-pill-response {
        fill: #dcfce7;
        stroke: #86efac;
        stroke-width: 1.5;
      }

      .lane-text-request,
      .lane-text-response {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .lane-text-request {
        fill: #1d4ed8;
      }

      .lane-text-response {
        fill: #047857;
      }

      .card {
        fill: #ffffff;
        stroke: #dbe4f0;
        stroke-width: 2;
        filter: url(#shadow);
      }

      .badge-request {
        fill: #2563eb;
      }

      .badge-response {
        fill: #059669;
      }

      .badge-text {
        fill: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 700;
      }

      .card-title {
        fill: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 700;
      }

      .card-body {
        fill: #475569;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
      }

      .chip {
        fill: #f8fafc;
        stroke: #cbd5e1;
        stroke-width: 1.25;
      }

      .chip-text {
        fill: #334155;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 700;
      }

      .request-line {
        stroke: #2563eb;
        stroke-width: 5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow-blue);
      }

      .response-line {
        stroke: #059669;
        stroke-width: 5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow-green);
      }

      .request-label,
      .response-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 700;
      }

      .request-label {
        fill: #1d4ed8;
      }

      .response-label {
        fill: #047857;
      }

      .packet-request {
        fill: #2563eb;
      }

      .packet-response {
        fill: #059669;
      }

      .packet-glow {
        opacity: 0.20;
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="560" rx="24" />

  <text class="title" x="70" y="66">Django Request / Response Flow</text>
  <text class="subtitle" x="70" y="96">Request goes through routing into the view. The view builds a response and sends it back to the browser.</text>

  <rect class="lane-pill-request" x="70" y="128" width="140" height="32" rx="16" />
  <text class="lane-text-request" x="140" y="149" text-anchor="middle">Request Lane</text>

  <rect class="lane-pill-response" x="70" y="438" width="154" height="32" rx="16" />
  <text class="lane-text-response" x="147" y="459" text-anchor="middle">Response Lane</text>

  <rect class="card" x="80" y="190" width="280" height="160" rx="22" />
  <rect class="card" x="500" y="190" width="280" height="160" rx="22" />
  <rect class="card" x="920" y="190" width="280" height="160" rx="22" />

  <circle class="badge-request" cx="120" cy="222" r="18" />
  <text class="badge-text" x="120" y="227" text-anchor="middle">1</text>

  <circle class="badge-request" cx="540" cy="222" r="18" />
  <text class="badge-text" x="540" y="227" text-anchor="middle">2</text>

  <circle class="badge-request" cx="960" cy="222" r="18" />
  <text class="badge-text" x="960" y="227" text-anchor="middle">3</text>

  <rect x="290" y="208" width="42" height="30" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" />
  <rect x="290" y="208" width="42" height="8" rx="8" fill="#dbeafe" />
  <circle cx="298" cy="212" r="1.8" fill="#60a5fa" />
  <circle cx="305" cy="212" r="1.8" fill="#60a5fa" />
  <circle cx="312" cy="212" r="1.8" fill="#60a5fa" />

  <path d="M694 210 H732" stroke="#2563eb" stroke-width="5" stroke-linecap="round" />
  <path d="M694 224 H720" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" />
  <path d="M694 238 H710" stroke="#93c5fd" stroke-width="5" stroke-linecap="round" />
  <circle cx="744" cy="210" r="5" fill="#2563eb" />
  <circle cx="730" cy="224" r="5" fill="#60a5fa" />
  <circle cx="718" cy="238" r="5" fill="#93c5fd" />

  <path d="M1116 208 L1134 226 L1116 244" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M1168 208 L1150 226 L1168 244" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M1140 226 H1144" stroke="#2563eb" stroke-width="6" stroke-linecap="round" />

  <text class="card-title" x="220" y="260" text-anchor="middle">Browser</text>
  <text class="card-body" x="220" y="286" text-anchor="middle">Browser or client sends an HTTP request</text>
  <text class="card-body" x="220" y="308" text-anchor="middle">with a method and URL path.</text>

  <rect class="chip" x="118" y="320" width="52" height="24" rx="12" />
  <text class="chip-text" x="144" y="336" text-anchor="middle">GET</text>
  <rect class="chip" x="178" y="320" width="58" height="24" rx="12" />
  <text class="chip-text" x="207" y="336" text-anchor="middle">POST</text>
  <rect class="chip" x="244" y="320" width="78" height="24" rx="12" />
  <text class="chip-text" x="283" y="336" text-anchor="middle">/about/</text>

  <text class="card-title" x="640" y="260" text-anchor="middle">urls.py</text>
  <text class="card-body" x="640" y="286" text-anchor="middle">Django matches the path against</text>
  <text class="card-body" x="640" y="308" text-anchor="middle">the configured URL patterns.</text>

  <rect class="chip" x="542" y="320" width="60" height="24" rx="12" />
  <text class="chip-text" x="572" y="336" text-anchor="middle">path()</text>
  <rect class="chip" x="610" y="320" width="70" height="24" rx="12" />
  <text class="chip-text" x="645" y="336" text-anchor="middle">include()</text>
  <rect class="chip" x="688" y="320" width="50" height="24" rx="12" />
  <text class="chip-text" x="713" y="336" text-anchor="middle">name</text>

  <text class="card-title" x="1060" y="260" text-anchor="middle">View</text>
  <text class="card-body" x="1060" y="286" text-anchor="middle">The selected view runs business logic</text>
  <text class="card-body" x="1060" y="308" text-anchor="middle">and returns the response.</text>

  <rect class="chip" x="968" y="320" width="56" height="24" rx="12" />
  <text class="chip-text" x="996" y="336" text-anchor="middle">logic</text>
  <rect class="chip" x="1032" y="320" width="72" height="24" rx="12" />
  <text class="chip-text" x="1068" y="336" text-anchor="middle">render()</text>
  <rect class="chip" x="1112" y="320" width="92" height="24" rx="12" />
  <text class="chip-text" x="1158" y="336" text-anchor="middle">HttpResponse</text>

  <path class="request-line" d="M360 270 H500" />
  <path class="request-line" d="M780 270 H920" />
  <text class="request-label" x="430" y="248" text-anchor="middle">Request</text>
  <text class="request-label" x="850" y="248" text-anchor="middle">Dispatch</text>

  <path class="response-line" d="M1060 350 V415 H220 V350" />
  <text class="response-label" x="640" y="404" text-anchor="middle">Response returns from the view back to the browser</text>

  <circle class="packet-request packet-glow" r="13" cx="0" cy="0">
    <animateMotion dur="3s" repeatCount="indefinite" path="M360 270 H500" />
  </circle>
  <circle class="packet-request" r="7" cx="0" cy="0">
    <animateMotion dur="3s" repeatCount="indefinite" path="M360 270 H500" />
  </circle>

  <circle class="packet-request packet-glow" r="13" cx="0" cy="0">
    <animateMotion dur="3s" begin="0.45s" repeatCount="indefinite" path="M780 270 H920" />
  </circle>
  <circle class="packet-request" r="7" cx="0" cy="0">
    <animateMotion dur="3s" begin="0.45s" repeatCount="indefinite" path="M780 270 H920" />
  </circle>

  <circle class="packet-response packet-glow" r="13" cx="0" cy="0">
    <animateMotion dur="4.2s" begin="1.1s" repeatCount="indefinite" path="M1060 350 V415 H220 V350" />
  </circle>
  <circle class="packet-response" r="7" cx="0" cy="0">
    <animateMotion dur="4.2s" begin="1.1s" repeatCount="indefinite" path="M1060 350 V415 H220 V350" />
  </circle>
</svg>
